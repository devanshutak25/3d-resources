# Controlled vocabularies for 3d_resources entries
# Source of truth. Keep in sync with entry.schema.json enum values.

license:
  - Open Source    # OSI-approved or similar (GPL, MIT, Apache, etc.)
  - Free           # Free closed-source, no commercial restriction
  - Free NC        # Free non-commercial only
  - Freemium       # Free tier + paid upgrades
  - Paid           # Paid-only (purchase or subscription)
  # null allowed for tutorials/references where license is inapplicable

entry_type:
  - software         # DCC, engine, standalone app (in §12 table + possibly listed elsewhere)
  - asset-source     # Site providing downloadable assets (Polyhaven, Quixel)
  - marketplace      # Asset/plugin marketplace (Fab, Gumroad, Cubebrush)
  - tool             # Small utility, CLI, or web tool
  - plugin           # Addon/extension to a host DCC or engine
  - tutorial         # Course / tutorial series / article
  - channel          # YouTube, Patreon, creator hub
  - community        # Forum, subreddit, Discord
  - reference        # Documentation, spec, standard (USD docs, etc.)
  - inspiration      # Showcase / portfolio hub

