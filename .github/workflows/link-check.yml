name: Link check

on:
  schedule:
    - cron: '0 6 * * 1'   # Mondays 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  link-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install js-yaml
      - name: Check all URLs
        run: node scripts/check-links.js
      - name: Regenerate README from updated data
        run: |
          npm install marked
          node scripts/render.js > README.md
      - name: Commit verification timestamps + deprecation flags
        run: |
          git config user.name "link-check-bot"
          git config user.email "link-check-bot@users.noreply.github.com"
          git add data/ README.md
          git diff --staged --quiet || git commit -m "chore(maintenance): weekly link check $(date +%Y-%m-%d)"
          git push || true
      - name: Open issue with broken/redirect summary
        uses: peter-evans/create-issue-from-file@v5
        with:
          title: "Link check report — ${{ github.run_id }}"
          content-filepath: _maintenance/link-check-$(date +%Y-%m-%d).md
          labels: maintenance,link-check
