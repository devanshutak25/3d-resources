name: Freshness

on:
  schedule:
    - cron: '0 8 1 * *'   # 1st of month 08:00 UTC (after link-check + release-watch)
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  freshness:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install js-yaml

      # --- Staleness + pricing (operate on catalog, no external watchlists) ---
      - name: Check GitHub repo staleness
        run: node scripts/check-repo-staleness.js
        continue-on-error: true
      - name: Check pricing freshness
        run: node scripts/check-pricing-freshness.js
        continue-on-error: true

      # --- Ingestion (each source isolated so one failure doesn't break the job) ---
      - name: Ingest itch.io
        run: node scripts/ingest-itch.js
        continue-on-error: true
      - name: Ingest 80 Level
        run: node scripts/ingest-80lvl.js
        continue-on-error: true
      - name: Ingest YouTube channels
        run: node scripts/ingest-youtube.js
        continue-on-error: true
      - name: Ingest Gumroad creators
        run: node scripts/ingest-gumroad.js
        continue-on-error: true

      # --- Digest ---
      - name: Build freshness digest
        id: digest
        run: |
          node scripts/freshness-digest.js
          echo "month=$(date -u +%Y-%m)" >> $GITHUB_OUTPUT

      # PR-based: avoids branch protection on main and surfaces changes for review.
      - name: Open PR with stale/archived flags + digest artifacts
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(maintenance): freshness ${{ steps.digest.outputs.month }}"
          branch: maintenance/freshness-${{ steps.digest.outputs.month }}
          delete-branch: true
          title: "chore(maintenance): freshness ${{ steps.digest.outputs.month }}"
          body: |
            Automated freshness sweep. See `_maintenance/freshness-${{ steps.digest.outputs.month }}.md` for the digest.

            Includes: `data/` mutations from `check-repo-staleness.js` (stale/archived/last_pushed flags),
            ingestion candidates, and pricing report.
          add-paths: |
            data/**
            _maintenance/freshness/**
            _maintenance/freshness-*.md
            _maintenance/freshness-*.json
          labels: maintenance,freshness

      - name: Open digest issue
        uses: peter-evans/create-issue-from-file@v5
        with:
          title: "Freshness digest — ${{ steps.digest.outputs.month }}"
          content-filepath: _maintenance/freshness-${{ steps.digest.outputs.month }}.md
          labels: maintenance,freshness
