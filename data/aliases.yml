# Search alias map.
#
# Format: { alias: canonical_phrase }
#   - "alias"            — short form / variant the user might type (lowercase)
#   - "canonical_phrase" — substring that must appear (case-insensitively) in
#                          an entry's name, tech tags, skill tags, or
#                          subsection slug for the alias to apply to it.
#
# At search-index build time:
#   for each entry, every canonical phrase that matches the entry adds its
#   alias keys to the entry's searchable `aliases` field. This means typing
#   "c4d" matches every Cinema 4D entry without per-entry maintenance.
#
# Add new aliases freely. Keep canonical phrases lowercase. If a canonical
# never matches any entry, the alias is harmless dead weight — prune as needed.
aliases:
